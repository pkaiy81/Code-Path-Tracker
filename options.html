<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Path Tracker Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Extension Settings</h1>
    <p class="description">Customize formatting and choose which sites activate Code Path Tracker.</p>

    <div class="card">
      <h2>Format</h2>
      <label for="enclosingLine">Enclosing Line
        <input type="text" id="enclosingLine" placeholder="--------------------">
      </label>

      <label for="arrow">Arrow
        <input type="text" id="arrow" placeholder="+->">
      </label>

      <label for="indentation">Indentation (number of spaces)
        <input type="number" id="indentation" min="0" value="2">
      </label>

      <label class="check-row">
        <input type="checkbox" id="includeLinks"> Include URLs in function names
      </label>
    </div>

    <div class="card">
      <h2>Activation URLs</h2>
      <label for="activeUrls">Enabled URLs (one per line)
        <textarea id="activeUrls" placeholder="https://opengrok.example.com/*&#10;https://specific-site.com/*"></textarea>
      </label>
      <div id="activeUrlsError" class="field-error" role="alert"></div>
    </div>

    <div class="card">
      <h2>Preview</h2>
      <pre id="preview"></pre>
      <div class="actions">
        <button id="save">Save</button>
        <div id="statusMessage" class="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
